categories:
  - title: "New Features"
    when:
      labels:
        - "enhancement"
  - title: "Maintenance"
    when:
      labels:
        - "maintenance"
  - title: "Bug Fixes"
    when:
      labels:
        - "bug"
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
template: |
  Special thanks to the contributors that made this release happen: $CONTRIBUTORS

  ## Full list of changes

  $CHANGES
